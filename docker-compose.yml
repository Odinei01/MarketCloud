version: "3.9"

# Teto de log para TODO container: evita que um crash-loop encha o vhdx do WSL2
# (incidente: marketcloud_connector gerou um json-log de ~194 GB e travou o disco).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketcloud_db
    environment:
      POSTGRES_USER: mcadmin
      POSTGRES_PASSWORD: mcsecret
      POSTGRES_DB: marketcloud
    ports:
      - "5433:5432"
    volumes:
      - marketcloud_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    # Precisa enxergar o pricing_db (SWARM) pro postgres_fdw (swarm_src.*).
    # Sem isso o fdw quebra em silencio: "could not translate host name pricing_db".
    networks:
      - default
      - swarm
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcadmin -d marketcloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: marketcloud_redis
    ports:
      - "6380:6379"
    volumes:
      - marketcloud_redisdata:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: marketcloud_api
    logging: *default-logging
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mcadmin:mcsecret@postgres:5432/marketcloud?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production-32chars!!
      PORT: "8090"
      ENV: development
      # Robo/SWARM p/ apply de keyword-hora (grava decisao no MarketCloud + chama o Robo)
      BID_ROBOT_API_BASE: "${BID_ROBOT_API_BASE:-http://host.docker.internal:8080}"
      # LWA token refresh for Ads subscription setup
      AMAZON_LWA_CLIENT_ID: "${AMAZON_LWA_CLIENT_ID}"
      AMAZON_LWA_CLIENT_SECRET: "${AMAZON_LWA_CLIENT_SECRET}"
      AMAZON_LWA_TOKEN_URL: "https://api.amazon.com/auth/o2/token"
      AMAZON_ADS_API_URL: "https://advertising-api.amazon.com"
      AMAZON_ADS_PROFILE_ID: "3084626225435227"
      # Amazon Marketing Stream SQS consumer
      STREAM_CONSUMER_ENABLED: "${STREAM_CONSUMER_ENABLED:-false}"
      STREAM_SQS_URL_TRAFFIC: "${STREAM_SQS_URL_TRAFFIC:-}"
      STREAM_SQS_URL_CONVERSION: "${STREAM_SQS_URL_CONVERSION:-}"
      STREAM_SQS_URL_SD_TRAFFIC: "${STREAM_SQS_URL_SD_TRAFFIC:-}"
      STREAM_SQS_URL_SD_CONVERSION: "${STREAM_SQS_URL_SD_CONVERSION:-}"
      # Payload cru so dos datasets listados. NUNCA use STREAM_DEBUG_RAW=true em
      # conta cheia: foi o que encheu 194GB de disco em 12/07.
      STREAM_DEBUG_RAW_DATASETS: "${STREAM_DEBUG_RAW_DATASETS:-}"
      STREAM_DEFAULT_STORE_ID: "${STREAM_DEFAULT_STORE_ID:-}"
      STREAM_EVENT_TIMEZONE: "${STREAM_EVENT_TIMEZONE:-America/Sao_Paulo}"
      STREAM_AWS_ACCESS_KEY_ID: "${STREAM_AWS_ACCESS_KEY_ID:-}"
      STREAM_AWS_SECRET_ACCESS_KEY: "${STREAM_AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "us-east-1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  connector-amazon:
    build:
      context: .
      dockerfile: Dockerfile.connector
    container_name: marketcloud_connector
    logging: *default-logging
    ports:
      - "8091:8091"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mcadmin:mcsecret@postgres:5432/marketcloud?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: "8091"
      ENV: development
      AMAZON_LWA_CLIENT_ID: "${AMAZON_LWA_CLIENT_ID}"
      AMAZON_LWA_CLIENT_SECRET: "${AMAZON_LWA_CLIENT_SECRET}"
      AMAZON_ADS_REDIRECT_URI: "${AMAZON_ADS_REDIRECT_URI:-http://localhost:8091/api/v1/connections/amazon/oauth/callback}"
      AMAZON_ADS_API_URL: "https://advertising-api.amazon.com"
      AMAZON_LWA_TOKEN_URL: "https://api.amazon.com/auth/o2/token"
      AMAZON_ADS_AUTH_URL: "https://www.amazon.com/ap/oa"
      AMC_API_URL: "https://advertising-api.amazon.com/amc/reporting"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  query-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: marketcloud_orchestrator
    logging: *default-logging
    ports:
      - "8092:8092"
    environment:
      DATABASE_URL: postgres://mcadmin:mcsecret@postgres:5432/marketcloud?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: "8092"
      ENV: development
      CONNECTOR_URL: "http://connector-amazon:8091"
      SWARM_SYNC_ENABLED: "true"
      SWARM_SYNC_INTERVAL_MINUTES: "60"
      SWARM_SYNC_RUN_IMMEDIATELY: "true"
      AMS_HOURLY_REFRESH_ENABLED: "true"
      AMS_HOURLY_REFRESH_INTERVAL_MINUTES: "60"
      AMS_HOURLY_REFRESH_RUN_IMMEDIATELY: "true"
      AMS_HOURLY_REFRESH_LOOKBACK_DAYS: "14"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  modeling-worker:
    build:
      context: .
      dockerfile: workers/modeling-worker/Dockerfile
    container_name: marketcloud_modeling_worker
    logging: *default-logging
    environment:
      DATABASE_URL: postgres://mcadmin:mcsecret@postgres:5432/marketcloud?sslmode=disable
      ENV: development
      HOURLY_REAL_ML_ENABLED: "${HOURLY_REAL_ML_ENABLED:-true}"
      HOURLY_REAL_ML_INTERVAL_MINUTES: "${HOURLY_REAL_ML_INTERVAL_MINUTES:-60}"
      HOURLY_REAL_ML_RUN_IMMEDIATELY: "${HOURLY_REAL_ML_RUN_IMMEDIATELY:-true}"
      ML_AUTO_APPLY_CAMPAIGN_ENABLED: "${ML_AUTO_APPLY_CAMPAIGN_ENABLED:-true}"
      ML_AUTO_APPLY_DRY_RUN: "${ML_AUTO_APPLY_DRY_RUN:-false}"
      ML_AUTO_APPLY_MAX_PER_RUN: "${ML_AUTO_APPLY_MAX_PER_RUN:-10}"
      ML_AUTO_APPLY_CONFIDENCE: "${ML_AUTO_APPLY_CONFIDENCE:-HIGH,MEDIUM}"
      ML_FULL_AUTO_CAMPAIGN_IDS: "${ML_FULL_AUTO_CAMPAIGN_IDS:-}"
      ML_FULL_AUTO_CAMPAIGN_NAMES: "${ML_FULL_AUTO_CAMPAIGN_NAMES:-}"
      ML_FULL_AUTO_REQUIRE_ALLOWLIST: "${ML_FULL_AUTO_REQUIRE_ALLOWLIST:-true}"
      # Full Control 360 executor (budget/placement/stop-loss). Default OFF + dry-run.
      FULL_CONTROL_360_APPLY_ENABLED: "${FULL_CONTROL_360_APPLY_ENABLED:-false}"
      FULL_CONTROL_360_APPLY_DRY_RUN: "${FULL_CONTROL_360_APPLY_DRY_RUN:-true}"
      BID_ROBOT_API_BASE: "${BID_ROBOT_API_BASE:-http://host.docker.internal:8080}"
      # Robo de negativacao (search term por CPA-alvo). Roda 1x/dia. Default OFF.
      NEGATIVE_KEYWORD_APPLY_ENABLED: "${NEGATIVE_KEYWORD_APPLY_ENABLED:-false}"
      NEGATIVE_KEYWORD_MAX_PER_RUN: "${NEGATIVE_KEYWORD_MAX_PER_RUN:-25}"
      # Calibracao de dayparting (control loop, 1x/semana). ADVISORY por padrao:
      # ENABLED liga o calculo+digest; APPLY_ENABLED (default OFF) liga a escrita
      # real de bid (so pilotos). WINDOW_DAYS = janela trailing.
      DAYPARTING_CALIBRATION_ENABLED: "${DAYPARTING_CALIBRATION_ENABLED:-true}"
      DAYPARTING_CALIBRATION_APPLY_ENABLED: "${DAYPARTING_CALIBRATION_APPLY_ENABLED:-false}"
      DAYPARTING_CALIBRATION_WINDOW_DAYS: "${DAYPARTING_CALIBRATION_WINDOW_DAYS:-28}"
      # Telegram (auditoria/notificacao das acoes executadas).
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: marketcloud_frontend
    working_dir: /app
    # npm install roda no container (binarios Linux corretos) e cai no volume
    # anonimo /app/node_modules, sem colidir com o node_modules do host (Windows).
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      VITE_API_PROXY_TARGET: "http://api:8090"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    logging: *default-logging
    restart: unless-stopped

networks:
  default:
  # Rede do SWARM (mercado-data-app) — necessaria pro fdw do postgres.
  swarm:
    external: true
    name: mercado-data-app_default

volumes:
  marketcloud_pgdata:
  marketcloud_redisdata:


